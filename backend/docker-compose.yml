# =============================================================
# docker-compose.yml — Producto 3 FullStackAttack (JobConnect)
# -------------------------------------------------------------
# Levanta dos servicios:
#   1. mongo         → base de datos MongoDB (puerto 27017)
#   2. mongo-express → panel web de administración (puerto 8083)
#
# Comandos útiles:
#   npm run db:up    → arrancar los contenedores
#   npm run db:down  → parar los contenedores
#   npm run db:logs  → ver logs de MongoDB en tiempo real
# =============================================================

services:
  # -----------------------------------------------------------
  # MongoDB: base de datos NoSQL del proyecto
  # -----------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: p3-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: jobconnect_producto3
    volumes:
      - mongo-data:/data/db
    networks:
      - p3-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Mongo Express: panel web para administrar MongoDB
  # Accesible en http://localhost:8083 tras arrancar
  # -----------------------------------------------------------
  mongo-express:
    image: mongo-express:1.0.2
    container_name: p3-mongo-express
    restart: unless-stopped
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - p3-network

# -------------------------------------------------------------
# Volumen con persistencia de los datos de Mongo.
# Así los datos no se pierden al parar y reiniciar el contenedor.
# -------------------------------------------------------------
volumes:
  mongo-data:
    driver: local

# -------------------------------------------------------------
# Red interna para que los contenedores se comuniquen
# entre ellos por nombre de servicio (p.ej. "mongo")
# -------------------------------------------------------------
networks:
  p3-network:
    driver: bridge